name: Docker build and push

on:
  workflow_call:
    inputs:
      tags:
        description: Image tags (newline-separated)
        required: true
        type: string
      nzbdav_version:
        description: NZBDAV_VERSION build arg
        required: true
        type: string
      checkout_ref:
        description: Git ref to build (defaults to triggering commit)
        required: false
        type: string
        default: ""
    secrets:
      registry_token:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry_token }}

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ inputs.tags }}
          build-args: |
            NZBDAV_VERSION=${{ inputs.nzbdav_version }}
            REPO_URL=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
